name: GameHub Pro Max Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: brew install xcodegen

      - name: Generate Project
        run: |
          mkdir -p GameHub
          # [The App.swift and Info.plist content goes here]
          xcodegen generate

      - name: Build and Archive
        run: |
          xcodebuild archive \
            -project GameHub.xcodeproj \
            -scheme GameHub \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/GameHub.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Create IPA
        run: |
          mkdir -p build/Payload
          cp -r build/GameHub.xcarchive/Products/Applications/*.app build/Payload/
          cd build && zip -qr GameHub_V2_Stable.ipa Payload

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: GameHub-IPA
          path: build/GameHub_V2_Stable.ipa
